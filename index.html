<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Manutenção - Veyron Joias</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .maintenance-container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 24px;
            color: #1a1a1a;
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 10px 40px rgba(212, 175, 55, 0.3);
            }
            50% {
                box-shadow: 0 10px 50px rgba(212, 175, 55, 0.6);
            }
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .divider {
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            margin: 30px auto;
        }

        .message {
            font-size: 18px;
            color: #ccc;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .status {
            display: inline-block;
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid #d4af37;
            border-radius: 50px;
            padding: 12px 30px;
            margin-bottom: 40px;
            font-size: 14px;
            color: #d4af37;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .contact-info {
            background: rgba(212, 175, 55, 0.05);
            border-left: 4px solid #d4af37;
            padding: 20px;
            margin-top: 40px;
            border-radius: 5px;
        }

        .contact-info p {
            font-size: 14px;
            color: #aaa;
            margin: 10px 0;
        }

        .contact-info strong {
            color: #d4af37;
        }

        .social-links {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .social-link {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.1);
            border: 2px solid #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d4af37;
            text-decoration: none;
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            background: #d4af37;
            color: #1a1a1a;
            transform: translateY(-5px);
        }

        .footer {
            margin-top: 50px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="logo">V</div>
        
        <h1>EM MANUTENÇÃO</h1>
        
        <div class="divider"></div>
        
        <div class="status">
            REALIZANDO MELHORIAS
        </div>
        
        <p class="message">
            Estamos trabalhando para trazer uma experiência ainda melhor para você. 
            <br><br>
            Nossa plataforma estará de volta em breve com novidades exclusivas e melhorias significativas.
        </p>

        <div class="footer">
            <p>© 2026 Veyron Joias. Todos os direitos reservados.</p>
        </div>
    </div>
</body>
</html>
